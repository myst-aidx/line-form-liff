<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>フォームへ移動中</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body {
      font-family: sans-serif;
      padding: 24px;
      line-height: 1.7;
      color: #333;
    }

    .box {
      max-width: 480px;
      margin: 40px auto;
      text-align: center;
    }

    .message {
      font-size: 16px;
      margin-bottom: 16px;
    }

    .error {
      color: #d93025;
      word-break: break-all;
      text-align: left;
      background: #fff3f3;
      padding: 12px;
      border-radius: 8px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="box">
    <p class="message">フォームへ移動しています...</p>
    <div id="error" class="error"></div>
  </div>

  <script>
    const LIFF_ID = "2010454322-kBiBwzhX";

    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxqAh6nhjdf0qxNTgeaLEQTjWUND_hCKtTv5NB7kLPiFnGwwKOxZD5FBtN95W5j4PD9/exec";

    async function main() {
      try {
        await liff.init({
          liffId: LIFF_ID
        });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const params = new URLSearchParams(window.location.search);
        const caseCode = params.get("case");

        if (!caseCode) {
          throw new Error("案件コードが指定されていません。URLに ?case=A のように付けてください。");
        }

        const profile = await liff.getProfile();
        const userId = profile.userId;

        const redirectUrl =
          GAS_WEB_APP_URL +
          "?case=" + encodeURIComponent(caseCode) +
          "&userId=" + encodeURIComponent(userId);

        window.location.href = redirectUrl;

      } catch (error) {
        showError(error);
      }
    }

    function showError(error) {
      const errorElement = document.getElementById("error");
      errorElement.style.display = "block";
      errorElement.textContent = "エラーが発生しました：" + error.message;
    }

    main();
  </script>
</body>
</html>
